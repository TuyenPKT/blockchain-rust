# .github/workflows/release.yml — PKTScan Desktop multi-platform release
# Trigger: push tag v* (e.g. v0.8.0)
# Output: GitHub Release với .dmg (macOS) + .msi/.exe (Windows) + .AppImage/.deb (Linux)

name: Release Desktop

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal (Intel + Apple Silicon)
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"

          # Windows x64
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust-targets: "x86_64-pc-windows-msvc"

          # Linux x64 → .AppImage + .deb
          - platform: ubuntu-22.04
            args: "--target x86_64-unknown-linux-gnu"
            rust-targets: "x86_64-unknown-linux-gnu"

    runs-on: ${{ matrix.platform }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      # ── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      # ── Linux system deps ─────────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      # ── Frontend ──────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      # ── Tauri build ───────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — set in repo secrets)
          APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:       ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                     ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName:       ${{ github.ref_name }}
          releaseName:   "PKTScan ${{ github.ref_name }}"
          releaseBody:   |
            ## PKTScan Desktop ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | macOS    | `PKTScan_*.dmg` | Universal (Intel + Apple Silicon) |
            | Windows  | `PKTScan_*.msi` | 64-bit installer |
            | Linux    | `pktscan_*.AppImage` | Portable |
            | Linux    | `pktscan_*.deb` | Debian/Ubuntu |

            ### Changelog
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)
          releaseDraft:   false
          prerelease:     false
          projectPath:    desktop
          args:           ${{ matrix.args }}
