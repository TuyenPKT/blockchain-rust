# .github/workflows/build-check.yml — PR / push build check
# Runs on every push to main and on PRs
# Validates: TypeScript strict + Rust build (no full bundle)

name: Build Check

on:
  push:
    branches: [main, master]
    paths:
      - "desktop/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "desktop/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  # ── TypeScript check ─────────────────────────────────────────────────────────
  typescript:
    name: TypeScript strict check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Install deps
        working-directory: desktop
        run: npm ci
      - name: Type check
        working-directory: desktop
        run: npx tsc --noEmit

  # ── Rust build ───────────────────────────────────────────────────────────────
  rust:
    name: Rust build (no bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config
      - name: Install Node.js (needed for tauri-build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json
      - name: Install frontend deps
        working-directory: desktop
        run: npm ci
      - name: Build frontend
        working-directory: desktop
        run: npm run build
      - name: Cargo build pktscan-desktop
        run: cargo build -p pktscan-desktop
      - name: Cargo test pktscan-desktop
        run: cargo test -p pktscan-desktop

  # ── Rust tests (main crate) ──────────────────────────────────────────────────
  rust-main:
    name: Rust tests (blockchain-rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: swatinem/rust-cache@v2
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      - name: Cargo test (excluding desktop)
        run: cargo test --workspace --exclude pktscan-desktop
