server {
    listen 80;
    server_name oceif.com www.oceif.com;

    root /var/www/html;
    index index.html;

    # Proxy /blockchain-rust/api/* → pktscan backend (strip prefix)
    location /blockchain-rust/api/ {
        rewrite ^/blockchain-rust(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy /blockchain-rust/static/* → pktscan backend
    location /blockchain-rust/static/ {
        rewrite ^/blockchain-rust(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # WebSocket
    location /blockchain-rust/ws {
        rewrite ^/blockchain-rust(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # Static files (symlink /var/www/html/blockchain-rust → repo)
    location /blockchain-rust/ {
        try_files $uri $uri/ /blockchain-rust/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
